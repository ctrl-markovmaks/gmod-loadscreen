<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Loading...</title>
    <style>
        body { margin: 0; padding: 0; background: #000; overflow: hidden; }
        #bg { width: 100vw; height: 100vh; object-fit: cover; }
    </style>
</head>
<body>
    <img id="bg" src="">

    <script>
        // Формат дат: "ГГГГ-ММ-ДДTHH:MM"
        // weight: относительный вес (шанс). 1 — стандарт, 3 — будет выпадать в 3 раза чаще стандарта. Если не указан, то =1
        const images = [
            { src: "https://i.imgur.com/o0K7tQd.png", weight: 1 }, // Высший инженерный метрополитен с "Москвой"
            { src: "https://i.imgur.com/AKi4MGg.png", weight: 1 }, // Высший инженерный метрополитен с "Ежём"
            { src: "https://i.imgur.com/wxOkdFb.png", weight: 1 }, // Реклама АКР-ММ
            //{ 
            //    src: "https://i.imgur.com/wxOkdFb.png", // Реклама 
            //    weight: 4,
            //    start: "2026-07-15T12:00", 
            //    end: "2026-07-20T23:59" 
            //},
            { 
                src: "https://i.imgur.com/uudUj8v.jpeg", // Реклама ивентов
                weight: 2, // Выпадает в 2 раза чаще
                start: "2026-07-15T00:00", 
                end: "2026-07-16T14:00" 
            }
        ];

        const now = new Date();
        
        // 1. Отбираем активные по времени картинки
        const activeImages = images.filter(img => {
            const start = img.start ? new Date(img.start) : null;
            const end = img.end ? new Date(img.end) : null;
            return (!start || now >= start) && (!end || now <= end);
        });

        // Если по датам пусто, откатываемся на полный список
        const pool = activeImages.length > 0 ? activeImages : images;

        // 2. Считаем суммарный вес всех доступных картинок
        const totalWeight = pool.reduce((sum, img) => sum + (img.weight || 1), 0);

        // 3. Выбираем случайное число в пределах общей суммы весов
        let randomNum = Math.random() * totalWeight;
        let selectedImg = pool[0];

        // 4. Ищем картинку, в чей интервал веса попал рандом
        for (const img of pool) {
            const weight = img.weight || 1;
            if (randomNum < weight) {
                selectedImg = img;
                break;
            }
            randomNum -= weight;
        }
        
        document.getElementById("bg").src = selectedImg.src;
    </script>
</body>
</html>
